name: prosepal
description: "AI-powered message helper for greeting cards and special occasions"
publish_to: 'none'
version: 1.1.2+36

environment:
  sdk: ^3.10.0  # Dart 3.10+ (Flutter 3.38+)

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management (Riverpod 3.2.x with matching annotation 4.0.x)
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.0.1

  # AI - Firebase AI Logic (Gemini via Firebase - secure, no exposed API key)
  firebase_ai: ^3.8.0

  # Payments
  purchases_flutter: 9.13.1
  purchases_ui_flutter: 9.13.1

  # Firebase (updated to latest)
  firebase_core: ^4.3.0
  firebase_analytics: ^12.1.2
  firebase_crashlytics: ^5.0.6

  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  gap: ^3.0.1

  # Utils
  shared_preferences: ^2.5.3
  uuid: ^4.5.3
  intl: ^0.20.2
  url_launcher: ^6.3.1
  supabase_flutter: ^2.12.0
  google_sign_in: ^7.2.0  # Native Google Sign In (7.x with new API)
  sign_in_with_apple: ^7.0.1  # Native Apple Sign In + official button
  crypto: ^3.0.7
  local_auth: ^3.0.1
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  device_info_plus: ^12.3.0
  in_app_review: ^2.0.11
  flutter_local_notifications: ^21.0.0
  add_2_calendar: ^3.0.1
  timezone: ^0.11.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  firebase_app_check: ^0.4.1+3
  flutter_native_splash: ^2.4.7
  flutter_secure_storage: ^10.0.0
  firebase_remote_config: ^6.1.3
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.12.2

  # Testing packages
  mocktail: ^1.0.4  # Mocking without code generation
  mock_supabase_http_client: ^0.0.3  # Official Supabase mock client
  http: ^1.4.0  # For HTTP mocking
  integration_test:
    sdk: flutter

  google_sign_in_platform_interface: any
  freezed: ^3.2.3
  json_serializable: ^6.13.0
  patrol: ^4.2.0
  patrol_finders: ^3.1.0
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/icons/
    - assets/images/onboarding/
    - assets/fonts/
    - assets/splash_transparent.png

# Patrol integration testing configuration
patrol:
  app_name: Prosepal
  test_directory: integration_test
  android:
    package_name: com.prosepal.prosepal
  ios:
    bundle_id: com.prosepal.prosepal

# Native splash screen configuration
# Navy slate background - matches AppColors.splash/AppColors.bgDark
flutter_native_splash:
  color: "#1D2633"
  color_dark: "#1D2633"

  # Android 12+ - explicit branded splash glyph to avoid platform fallback chrome
  android_12:
    image: assets/images/logo_android.png
    color: "#1D2633"
    color_dark: "#1D2633"

  web: false
