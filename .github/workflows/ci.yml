name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Flutter Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Commit attribution guard
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-list --max-parents=0 "${{ github.sha }}" | tail -n1)"
            fi
            RANGE="$BASE_SHA..${{ github.sha }}"
          fi

          ./scripts/check_commit_attribution.sh --range "$RANGE"

      - name: Secret history guard
        shell: bash
        run: bash ./scripts/security_history_guard.sh

      - name: Detect docs-only change scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git rev-parse HEAD^)"
            fi
          fi

          git diff --name-only "$BASE_SHA" "${{ github.sha }}" > /tmp/changed_files.txt

          docs_only=true
          while IFS= read -r file; do
            if [[ -z "$file" ]]; then
              continue
            fi

            if [[ "$file" =~ ^docs/ ]]; then
              continue
            fi

            if [[ "$file" =~ \.md$ ]]; then
              continue
            fi

            if [[ "$file" == "LICENSE" ]]; then
              continue
            fi

            docs_only=false
            break
          done < /tmp/changed_files.txt

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Docs-only fast path
        if: steps.scope.outputs.docs_only == 'true'
        run: |
          echo "Docs-only change detected."
          echo "Skipping Flutter install/build/test to save CI minutes."

      - name: Release config preflight tests
        if: steps.scope.outputs.docs_only != 'true'
        run: ./scripts/test_release_preflight.sh

      - name: Install Deno
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          curl -fsSL https://deno.land/install.sh | sh -s -- -q
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Validate Supabase edge-function TypeScript
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t TS_FILES < <(find supabase/functions -name '*.ts' | sort)
          if [[ "${#TS_FILES[@]}" -eq 0 ]]; then
            echo "No Supabase TypeScript files found."
            exit 0
          fi
          deno check "${TS_FILES[@]}"

      - name: Install Flutter SDK
        if: steps.scope.outputs.docs_only != 'true'
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.38.6 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version

      - name: Install dependencies
        if: steps.scope.outputs.docs_only != 'true'
        run: flutter pub get

      - name: Static analysis
        if: steps.scope.outputs.docs_only != 'true'
        run: flutter analyze --no-fatal-infos

      - name: Launch/auth color parity guard
        if: steps.scope.outputs.docs_only != 'true'
        run: ./scripts/check_launch_color_parity.sh

      - name: Critical smoke gate
        if: steps.scope.outputs.docs_only != 'true'
        run: ./scripts/test_critical_smoke.sh

      - name: Unit and widget tests (non-golden)
        if: steps.scope.outputs.docs_only != 'true'
        run: |
          mapfile -t TEST_FILES < <(find test -name '*_test.dart' ! -path 'test/widgets/goldens/*' | sort)
          flutter test --exclude-tags flaky --coverage "${TEST_FILES[@]}"

      - name: Service coverage gate
        if: steps.scope.outputs.docs_only != 'true'
        env:
          MIN_COVERAGE: '35'
        run: ./scripts/check_service_coverage.sh coverage/lcov.info

      - name: Flutter debug bundle build
        if: steps.scope.outputs.docs_only != 'true'
        run: flutter build bundle --debug

      - name: Upload coverage artifact
        if: always() && steps.scope.outputs.docs_only != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

  visual_regression:
    name: Visual Regression (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    if: needs.quality.outputs.docs_only != 'true'
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Flutter SDK
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.38.6 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run visual regression suite
        id: visual
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/test_visual_regression.sh

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: visual-regression-diffs
          path: |
            test/widgets/goldens/failures/**
          if-no-files-found: warn
          retention-days: 14

      - name: Visual regression summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Visual Regression (non-blocking)"
            if [[ "${{ steps.visual.outcome }}" == "success" ]]; then
              echo "- Status: ✅ passed"
              echo "- Baseline unchanged."
            else
              echo "- Status: ⚠️ failed (non-blocking)"
              echo "- Diff artifacts: \`visual-regression-diffs\`"
              echo "- To accept intended UI changes locally:"
              echo "  - \`./scripts/test_visual_regression.sh --update\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  integration_smoke:
    name: Integration Smoke (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    if: needs.quality.outputs.docs_only != 'true'
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Flutter SDK
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.38.6 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          "$HOME/flutter/bin/flutter" --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration smoke target
        id: smoke
        uses: reactivecircus/android-emulator-runner@324029e2f414c084d8b15ba075288885e74aef9c
        env:
          INTEGRATION_CAPTURE_SCREENSHOTS: "true"
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          ram-size: 2048M
          script: |
            set -euo pipefail
            mkdir -p artifacts/integration-smoke
            flutter devices
            flutter test -d emulator-5554 integration_test/smoke_test.dart -r expanded 2>&1 | tee artifacts/integration-smoke/smoke.log

      - name: Upload integration smoke artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: integration-smoke-artifacts
          path: |
            artifacts/integration-smoke/**
            integration_test/screenshots/**
          if-no-files-found: warn
          retention-days: 14

      - name: Integration smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Integration Smoke (non-blocking)"
            if [[ "${{ steps.smoke.outcome }}" == "success" ]]; then
              echo "- Status: ✅ passed"
            else
              echo "- Status: ⚠️ failed (non-blocking)"
              echo "- Artifacts: \`integration-smoke-artifacts\`"
            fi
            echo "- Target: Android emulator (API 34)"
            echo "- Command: \`flutter test -d emulator-5554 integration_test/smoke_test.dart\`"
          } >> "$GITHUB_STEP_SUMMARY"
